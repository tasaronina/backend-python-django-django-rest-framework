<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Создание новостного материала</title>
    <link rel="stylesheet" href="./mockup-style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1 class="sidebar-title">Модуль подготовки новости</h1>
        <nav class="nav">
          <a class="nav-item active" href="./interface-mockups.html">Новостной материал</a>
          <a class="nav-item" href="./news-create.html">Новость</a>
          <a class="nav-item" href="./news-image-attach.html">Изображение</a>
        </nav>
      </aside>

      <main class="content">
        <div class="topbar">
          <h1>Модуль подготовки новости</h1>
          <div class="badge">Демо-версия</div>
        </div>

        <section class="page">
          <div class="page-header">
            <h2>Создание новостного материала</h2>
            <div class="message success">Новостной материал сохранён</div>
          </div>

          <form class="form">
            <div class="grid-two">
              <div class="field full">
                <label>Описание события</label>
                <textarea>Краткое описание события, полученного из источника сведений.</textarea>
              </div>
              <div class="field">
                <label>Источник сведений</label>
                <input value="Пресс-служба администрации" />
              </div>
              <div class="field">
                <label>Дата получения</label>
                <input value="2026-06-09 10:30" />
              </div>
              <div class="field">
                <label>Место события</label>
                <input value="Городской центр" />
              </div>
              <div class="field">
                <label>Автор материала</label>
                <input value="Иванов И.И." />
              </div>
              <div class="field">
                <label>Категория</label>
                <input value="Общество" />
              </div>
              <div class="field">
                <label>Территория</label>
                <input value="Город" />
              </div>
            </div>

            <div class="actions">
              <button class="button" type="button">Сохранить новостной материал</button>
            </div>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
