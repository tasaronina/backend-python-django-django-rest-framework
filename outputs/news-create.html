<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Создание новости</title>
    <link rel="stylesheet" href="./mockup-style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1 class="sidebar-title">Модуль подготовки новости</h1>
        <nav class="nav">
          <a class="nav-item" href="./interface-mockups.html">Новостной материал</a>
          <a class="nav-item active" href="./news-create.html">Новость</a>
          <a class="nav-item" href="./news-image-attach.html">Изображение</a>
        </nav>
      </aside>

      <main class="content">
        <div class="topbar">
          <h1>Модуль подготовки новости</h1>
          <div class="badge">Демо-версия</div>
        </div>

        <section class="page">
          <div class="page-header">
            <h2>Создание новости</h2>
            <div class="message success">Новость сохранена</div>
          </div>

          <form class="form">
            <div class="grid-two">
              <div class="field full">
                <label>Новостной материал</label>
                <select>
                  <option>Материал #1: описание события</option>
                </select>
              </div>
              <div class="field full">
                <label>Заголовок</label>
                <input value="В городе состоялось значимое мероприятие" />
              </div>
              <div class="field full">
                <label>Текст</label>
                <textarea>Подготовленный текст новости на основе сохранённого новостного материала.</textarea>
              </div>
              <div class="field">
                <label>Автор</label>
                <input value="Петрова А.А." />
              </div>
              <div class="field">
                <label>Тег</label>
                <input value="город" />
              </div>
              <div class="field">
                <label>Категория</label>
                <input value="Общество" />
              </div>
              <div class="field">
                <label>Территория</label>
                <input value="Город" />
              </div>
            </div>

            <div class="actions">
              <button class="button" type="button">Сохранить новость</button>
            </div>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
