<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Прикрепление изображения</title>
    <link rel="stylesheet" href="./mockup-style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1 class="sidebar-title">Модуль подготовки новости</h1>
        <nav class="nav">
          <a class="nav-item" href="./interface-mockups.html">Новостной материал</a>
          <a class="nav-item" href="./news-create.html">Новость</a>
          <a class="nav-item active" href="./news-image-attach.html">Изображение</a>
        </nav>
      </aside>

      <main class="content">
        <div class="topbar">
          <h1>Модуль подготовки новости</h1>
          <div class="badge">Демо-версия</div>
        </div>

        <section class="page">
          <div class="page-header">
            <h2>Прикрепление изображения</h2>
            <div class="message error">Формат изображения должен быть JPEG, JPG или PNG.</div>
          </div>

          <form class="form">
            <div class="grid-two">
              <div class="field full">
                <label>Новость</label>
                <select>
                  <option>Новость #1: В городе состоялось значимое мероприятие</option>
                </select>
              </div>
              <div class="field full">
                <label>Файл изображения</label>
                <input type="file" />
              </div>
            </div>

            <div class="actions">
              <button class="button" type="button">Прикрепить изображение</button>
            </div>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
